name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Build, lint, and test on all three release targets. This is also where the
# macOS and Linux native watchers (cfg-gated, not built on a Windows dev box)
# are compiled and verified.
jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libxdo-dev \
            libxss-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Lint (eslint)
        run: pnpm lint

      - name: Typecheck + frontend build
        run: pnpm build

      - name: Rust format check
        working-directory: app/src-tauri
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: app/src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Rust unit tests
        working-directory: app/src-tauri
        run: cargo test

      - name: Tauri build (compiles this OS's native watcher)
        run: pnpm tauri build

  extension:
    name: Browser extension
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate manifest.json
        run: |
          node -e "const m=require('./extension/manifest.json'); \
            if (m.manifest_version !== 3) throw new Error('manifest_version must be 3'); \
            if (!m.background || !m.background.service_worker) throw new Error('missing background.service_worker'); \
            if (!m.action || !m.action.default_popup) throw new Error('missing action.default_popup'); \
            console.log('manifest ok:', m.name, m.version)"

      - name: Syntax-check extension scripts
        run: |
          node --check extension/background.js
          node --check extension/popup.js

      - name: web-ext lint (informational)
        continue-on-error: true
        run: npx --yes web-ext@8 lint --source-dir extension --warnings-as-errors=false

  test-e2e:
    name: E2E Tests (Linux)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libxdo-dev \
            libxss-dev \
            webkit2gtk-driver \
            xvfb

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install tauri-driver
        run: cargo install tauri-driver

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Build App
        run: pnpm tauri build --debug

      - name: Run E2E tests
        run: xvfb-run pnpm test:e2e
