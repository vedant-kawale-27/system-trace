name: Bug report
description: Report something that does not work the way it should.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in the details below so
        the issue can be reproduced and fixed.

  - type: input
    id: os
    attributes:
      label: Operating system and version
      placeholder: "Windows 11 23H2 / macOS 14.5 / Ubuntu 24.04 (X11)"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: System Trace version
      description: From the app's About screen, or the installer file name.
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear, short description of the problem.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Number the steps so someone else can follow them.
      placeholder: |
        1. Open the app
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or error messages
      description: Paste any relevant log output or attach screenshots.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I am running the latest released version, or a recent build from main.
          required: true
