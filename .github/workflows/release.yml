name: Release

# Tag a version (e.g. v0.1.0) to build installers for all three OSes and attach
# them to a GitHub Release (the primary distribution channel; see
# docs/DISTRIBUTION.md). Signing/notarization are deferred and added later.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libxdo-dev \
            libxss-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Build and publish installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: "System Trace ${{ github.ref_name }}"
          releaseBody: "Download the installer for your OS below. All data stays local on your machine."
          releaseDraft: true
          prerelease: false

  # Package the companion browser extension and attach it to the same draft
  # release, so users can grab the load-unpacked zip alongside the installers.
  extension:
    name: Package browser extension
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Validate and zip the extension
        run: |
          node -e "const m=require('./extension/manifest.json'); if (m.manifest_version!==3) throw new Error('bad manifest'); console.log('ok', m.version)"
          cd extension
          zip -r ../system-trace-extension-${{ github.ref_name }}.zip . -x '*.DS_Store'

      - name: Attach to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: system-trace-extension-${{ github.ref_name }}.zip
